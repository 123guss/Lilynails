<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily Nails — Panel</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-mark">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32"><path d="M20 6C20 6 11 14 11 22C11 27.5 14.8 31 20 31C25.2 31 29 27.5 29 22C29 14 20 6 20 6Z" stroke="currentColor" stroke-width="1.4"/><path d="M20 13V31" stroke="currentColor" stroke-width="1.4"/></svg>
    </div>
    <h1 class="login-title">Hola, Lily 🌸</h1>
    <p class="login-sub">Entra para administrar tu catálogo</p>

    <form id="login-form" class="login-form">
      <input type="email" id="login-email" placeholder="Tu correo" required autocomplete="email">
      <input type="password" id="login-password" placeholder="Tu contraseña" required autocomplete="current-password">
      <button type="submit" class="login-btn">Entrar</button>
    </form>
    <p class="login-error" id="login-error" hidden></p>
  </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div class="admin-panel" id="admin-panel" hidden>

  <header class="admin-header">
    <div class="admin-header-inner">
      <span class="admin-brand">Lily Nails · Panel</span>
      <button class="admin-logout" id="logout-btn">Salir</button>
    </div>
  </header>

  <main class="admin-main">

    <!-- Upload form -->
    <section class="admin-card">
      <h2 class="admin-card-title">Publicar nuevo diseño</h2>

      <form id="upload-form" class="upload-form">
        <label class="upload-drop" id="upload-drop">
          <input type="file" id="image-input" accept="image/*" required hidden>
          <div class="upload-drop-empty" id="upload-drop-empty">
            <svg viewBox="0 0 48 48" width="36" height="36" fill="none" aria-hidden="true"><path d="M24 8v24M14 18l10-10 10 10M10 36h28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <p>Toca para subir una foto</p>
          </div>
          <img id="upload-preview" hidden>
        </label>

        <div class="field-group">
          <label for="design-name">Nombre del diseño</label>
          <input type="text" id="design-name" placeholder="Ej: Francesa con glitter" required>
        </div>

        <div class="field-group">
          <label for="design-price">Precio (en Q)</label>
          <input type="number" id="design-price" placeholder="Ej: 150" min="0" step="1" required>
        </div>

        <div class="field-group">
          <label for="design-category">Categoría</label>
          <select id="design-category" required>
            <option value="" disabled selected>Elige una categoría</option>
            <option value="Gel">Gel</option>
            <option value="Acrílico">Acrílico</option>
            <option value="Decoradas">Decoradas</option>
            <option value="Francesas">Francesas</option>
            <option value="Press-on">Press-on</option>
            <option value="__new__">+ Crear categoría nueva</option>
          </select>
          <input type="text" id="design-category-new" placeholder="Escribe el nombre de la categoría nueva" hidden>
        </div>

        <div class="field-group">
          <label for="design-desc">Descripción (opcional)</label>
          <textarea id="design-desc" rows="2" placeholder="Algún detalle extra del diseño..."></textarea>
        </div>

        <button type="submit" class="publish-btn" id="publish-btn">Publicar</button>
        <p class="upload-status" id="upload-status" hidden></p>
      </form>
    </section>

    <!-- Existing designs -->
    <section class="admin-card">
      <h2 class="admin-card-title">Tu catálogo actual</h2>
      <div class="admin-grid" id="admin-grid"></div>
      <p class="admin-empty" id="admin-empty" hidden>Aún no has publicado ningún diseño. ¡Sube el primero arriba! ✨</p>
    </section>

  </main>
</div>

<!-- Confirm delete modal -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-card">
    <p class="confirm-text">¿Eliminar este diseño del catálogo?</p>
    <p class="confirm-sub">Esta acción no se puede deshacer.</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirm-cancel">Cancelar</button>
      <button class="confirm-delete" id="confirm-delete">Eliminar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="admin.js"></script>
</body>
</html>
